<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" width="1100" height="300" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2581F"/>
      <stop offset="0.55" stop-color="#D81B00"/>
      <stop offset="1" stop-color="#BC0C00"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1100" height="300" rx="24" fill="url(#bg)"/>
  <rect width="1100" height="300" rx="24" fill="url(#sheen)"/>

  <!-- 一对小眼睛(居中,字标上方) -->
  <g fill="#1a0300">
    <rect x="516" y="66" width="26" height="50" rx="9"/>
    <rect x="558" y="66" width="26" height="50" rx="9"/>
  </g>
  <g fill="#ffffff" opacity="0.92">
    <circle cx="524" cy="80" r="5.5"/>
    <circle cx="566" cy="80" r="5.5"/>
  </g>

  <!-- 字标 -->
  <text x="550" y="216" text-anchor="middle" font-size="96" font-weight="800" letter-spacing="1.5" fill="#FFF4EC">Clawd Mood</text>
</svg>
